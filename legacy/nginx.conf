server {
    listen 80;
    server_name localhost;
    root /media/juen/SharedPartition/Projects/SIGAP-PNJ/public;
    index index.php index.html;

    # Allow larger file uploads
    client_max_body_size 12M;

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Disable directory listing
    autoindex off;

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }

    # API Routes - forward to index.php
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires max;
        log_not_found off;
    }

    # SPA Fallback - all other routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Adjust the socket path to match your PHP version (e.g., php8.1-fpm.sock, php8.2-fpm.sock)
        # or use 127.0.0.1:9000 if configured to listen on TCP
        fastcgi_pass unix:/run/php/php-fpm.sock; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass_header Authorization;
    }
}

    <div id="videoIntro" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #1a1a1a;
      z-index: 99999;
      display: flex;

      justify-content: center;
      cursor: pointer;
    ">
      <video id="introVideo" 
        autoplay 
        muted 
        playsinline
        style="
          width: 100%;
          height: 100%;
          object-fit: cover;
          background: #1a1a1a;
        ">
        <source src="/assets/video/intro.mp4" type="video/mp4">
        <source src="/assets/video/intro.webm" type="video/webm">
        Your browser does not support the video tag.
      </video>
      
      <!-- Skip button overlay -->
      <div style="
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: rgba(84, 210, 232, 0.25);
        backdrop-filter: blur(10px);
        padding: 10px 20px;
        border-radius: 50px;
        color: rgba(255, 255, 255, 0.95);
        font-size: 13px;
        font-weight: 400;
        border: 1px solid rgba(84, 210, 232, 0.35);
        transition: all 0.3s ease;
        pointer-events: none;
        box-shadow: 0 2px 12px rgba(84, 210, 232, 0.2);
        opacity: 0.6;
      " id="skipHint">
        Klik di mana saja untuk melewati
      </div>
    </div>

    <!-- Root Element - All content will be rendered here -->

    <!-- Video Intro Script -->
    <script>
      (function() {
        const videoIntro = document.getElementById('videoIntro');
        const introVideo = document.getElementById('introVideo');
        const skipHint = document.getElementById('skipHint');
        
        // Check if video intro was already shown in this session
        const hasSeenIntro = sessionStorage.getItem('hasSeenIntro');
        
        if (hasSeenIntro === 'true') {
          // Skip intro if already seen
          videoIntro.style.display = 'none';
          return;
        }
        
        // Detect if user is on mobile device (exclude iPad/tablets)
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (window.innerWidth <= 768 && !/iPad/i.test(navigator.userAgent));
        
        // Set video source based on device type
        const videoSource = isMobile ? '/assets/video/introm.mp4' : '/assets/video/intro.mp4';
        introVideo.src = videoSource;
        introVideo.load();
        
        // Function to hide intro with fade out
        function hideIntro() {
          sessionStorage.setItem('hasSeenIntro', 'true');
          videoIntro.style.transition = 'opacity 0.5s ease-out';
          videoIntro.style.opacity = '0';
          
          setTimeout(() => {
            videoIntro.style.display = 'none';
          }, 500);
        }
        
        // Hide intro when video ends
        introVideo.addEventListener('ended', hideIntro);
        
        // Skip on click anywhere
        videoIntro.addEventListener('click', function(e) {
          hideIntro();
        });
        
        // Optional: Skip on ESC key
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && videoIntro.style.display !== 'none') {
            hideIntro();
          }
        });
        
        // Add hover effect to skip hint
        videoIntro.addEventListener('mouseenter', function() {
          skipHint.style.opacity = '0.85';
          skipHint.style.background = 'rgba(84, 210, 232, 0.4)';
          skipHint.style.borderColor = 'rgba(84, 210, 232, 0.5)';
        });
        
        videoIntro.addEventListener('mouseleave', function() {
          skipHint.style.opacity = '0.6';
          skipHint.style.background = 'rgba(84, 210, 232, 0.25)';
          skipHint.style.borderColor = 'rgba(84, 210, 232, 0.35)';
        });
      })();
    </script>

    <!-- Chatbot Component -->
    <script>
      // IMPORTANT: Replace with your actual VPS IP address
      // Example: new ChatbotBubble('http://123.456.789.012:11434');
      class ChatbotBubble {
          constructor(apiUrl = 'http://localhost:11434') {
              this.apiUrl = apiUrl;
              this.isOpen = false;
              this.chatHistory = [];
              this.createBubble();
              this.createChatBox();
              this.attachEventListeners();
          }

          createBubble() {
              // Create the floating bubble element
              const bubble = document.createElement('div');
              bubble.id = 'chatbot-bubble';
              bubble.innerHTML = `
                  <div class="chatbot-icon">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                      </svg>
                  </div>
              `;
              document.body.appendChild(bubble);
          }

          createChatBox() {
              // Create the chatbox container
              const container = document.createElement('div');
              container.id = 'chatbot-container';
              container.innerHTML = `
                  <div class="chatbot-header">
                      <div class="chatbot-title">GITA (Gateway Informasi dan Tanya Administrasi)</div>
                      <button class="chatbot-close">&times;</button>
                  </div>
                  <div class="chatbot-messages" id="chatbot-messages">
                      <div class="message bot-message">
                          Halo! Saya asisten LPJ & KAK. Bagaimana saya bisa membantu Anda hari ini?
                      </div>
                  </div>
                  <div class="chatbot-input-area">
                      <input type="text" class="chatbot-input" id="chatbot-input" placeholder="Ketik pesan Anda...">
                      <button class="chatbot-send-btn" id="chatbot-send-btn">
                          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <line x1="22" y1="2" x2="11" y2="13"></line>
                              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                          </svg>
                      </button>
                  </div>
              `;
              document.body.appendChild(container);
          }

          attachEventListeners() {
              const bubble = document.getElementById('chatbot-bubble');
              const container = document.getElementById('chatbot-container');
              const closeBtn = document.querySelector('.chatbot-close');
              const sendBtn = document.getElementById('chatbot-send-btn');
              const input = document.getElementById('chatbot-input');

              // Toggle chatbox on bubble click
              bubble.addEventListener('click', () => {
                  this.toggleChatBox();
              });

              // Close chatbox
              closeBtn.addEventListener('click', () => {
                  this.closeChatBox();
              });

              // Send message on button click
              sendBtn.addEventListener('click', () => {
                  this.sendMessage();
              });

              // Send message on Enter key
              input.addEventListener('keypress', (e) => {
                  if (e.key === 'Enter') {
                      this.sendMessage();
                  }
              });
          }

          toggleChatBox() {
              const container = document.getElementById('chatbot-container');
              if (!this.isOpen) {
                  container.classList.add('open');
                  this.isOpen = true;
              } else {
                  this.closeChatBox();
              }
          }

          closeChatBox() {
              const container = document.getElementById('chatbot-container');
              container.classList.remove('open');
              this.isOpen = false;
          }

          async sendMessage() {
              const input = document.getElementById('chatbot-input');
              const message = input.value.trim();

              if (!message) return;

              // Add user message to chat
              this.addMessage(message, 'user');
              input.value = '';

              // Show typing indicator
              const typingIndicator = this.addTypingIndicator();

              try {
                  // Call the Ollama API
                  const response = await this.callOllamaAPI(message);

                  // Remove typing indicator
                  this.removeTypingIndicator(typingIndicator);

                  // Add bot response to chat
                  this.addMessage(response, 'bot');
              } catch (error) {
                  // Remove typing indicator
                  this.removeTypingIndicator(typingIndicator);

                  // Show error message
                  this.addMessage('Terjadi kesalahan saat menghubungi asisten. Silakan coba lagi.', 'bot');
                  console.error('Chatbot error:', error);
              }
          }

          async callOllamaAPI(prompt) {
              const response = await fetch(`/api/ollama/api/generate`, {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                      model: 'lpj-kak-bot',
                      prompt: prompt,
                      stream: false,
                      options: {
                          temperature: 0.6,
                          top_p: 0.9
                      }
                  })
              });

              if (!response.ok) {
                  throw new Error(`HTTP error! status: ${response.status}`);
              }

              const data = await response.json();
              return data.response;
          }

          addMessage(text, sender) {
              const messagesContainer = document.getElementById('chatbot-messages');
              const messageDiv = document.createElement('div');
              messageDiv.className = `message ${sender}-message`;
              messageDiv.textContent = text;
              messagesContainer.appendChild(messageDiv);

              // Scroll to bottom
              messagesContainer.scrollTop = messagesContainer.scrollHeight;

              // Save to chat history
              this.chatHistory.push({ sender, text });
          }

          addTypingIndicator() {
              const messagesContainer = document.getElementById('chatbot-messages');
              const typingDiv = document.createElement('div');
              typingDiv.className = 'typing-indicator';
              typingDiv.id = 'typing-indicator';
              typingDiv.textContent = 'Mengetik...';
              messagesContainer.appendChild(typingDiv);

              // Scroll to bottom
              messagesContainer.scrollTop = messagesContainer.scrollHeight;

              return typingDiv;
          }

          removeTypingIndicator(element) {
              if (element && element.parentNode) {
                  element.parentNode.removeChild(element);
              }
          }
      }

      // Initialize the chatbot when the DOM is loaded
      document.addEventListener('DOMContentLoaded', function() {
          // IMPORTANT: Replace with your actual VPS IP address
          // Example: new ChatbotBubble('http://123.456.789.012:11434');
          new ChatbotBubble(''); // Your VPS IP - Using corrected fast model
      });
    </script>
